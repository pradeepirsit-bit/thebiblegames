<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScriptureShapes | Interactive Bible Puzzles</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .hidden { display: none !important; }
        .circular-grid { 
            display: grid; 
            gap: 2px; 
            justify-content: center; 
            background: #fff; 
            padding: 20px; 
            border-radius: 50%;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col selection:bg-indigo-100 selection:text-indigo-900">

    <header class="fixed top-0 left-0 right-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-200/60 px-6 py-4 flex items-center justify-between">
        <div class="flex items-center space-x-3 cursor-pointer group" onclick="switchScreen('home')">
            <div class="w-9 h-9 bg-slate-900 rounded-xl flex items-center justify-center text-white font-bold text-lg group-hover:bg-indigo-600 transition-colors">✝</div>
            <h1 class="text-xl font-bold tracking-tight text-slate-900">Scripture<span class="text-indigo-600">Shapes</span></h1>
        </div>
        <button id="btn-dashboard" onclick="switchScreen('home')" class="hidden text-sm font-semibold text-slate-500 hover:text-slate-900 px-4 py-2 rounded-full hover:bg-slate-100 transition-all">
            Dashboard
        </button>
    </header>

    <input type="text" id="hidden-input" class="absolute opacity-0 pointer-events-none w-0 h-0" maxlength="1">

    <main class="flex-grow w-full pt-24 pb-12 px-4 md:px-8 max-w-6xl mx-auto flex flex-col items-center justify-center">

        <section id="screen-home" class="w-full fade-in">
            <div class="text-center max-w-2xl mx-auto mb-16 mt-8">
                <h2 class="text-4xl md:text-5xl font-extrabold text-slate-900 mb-5 tracking-tight">Engage the Word. <br> Break the Grid.</h2>
                <p class="text-lg text-slate-500 font-medium leading-relaxed">Choose a geometric format below to test your knowledge in new ways.</p>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-6" id="game-catalog"></div>
        </section>

        <section id="screen-setup" class="w-full max-w-lg hidden fade-in text-center bg-white p-8 rounded-3xl shadow-md border border-slate-200/60">
            <div id="setup-icon" class="w-16 h-16 bg-indigo-50 text-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-6 text-3xl"></div>
            <h2 class="text-2xl font-bold text-slate-900 mb-2">Select Difficulty</h2>
            <div class="grid grid-cols-2 gap-4 mb-8 mt-6">
                <button onclick="setDifficulty('easy')" id="btn-diff-easy" class="p-5 rounded-2xl border-2 text-left border-indigo-600 bg-indigo-50">
                    <div class="text-lg font-bold text-slate-900">Guided</div>
                    <div class="text-xs text-slate-500 mt-1">Starting letters provided.</div>
                </button>
                <button onclick="setDifficulty('hard')" id="btn-diff-hard" class="p-5 rounded-2xl border-2 text-left border-slate-100 hover:border-slate-300">
                    <div class="text-lg font-bold text-slate-900">Expert</div>
                    <div class="text-xs text-slate-500 mt-1">Completely blank grids.</div>
                </button>
            </div>
            <button onclick="startGame()" class="w-full py-4 bg-slate-900 text-white font-semibold rounded-xl hover:bg-slate-800 transition-all active:scale-95">Begin Level <span id="btn-level-num">1</span></button>
        </section>

        <section id="screen-playing" class="w-full hidden fade-in">
            <div id="api-loading" class="hidden w-full p-12 text-center text-indigo-600 font-bold animate-pulse text-lg">
                Fetching dynamic scripture via Bible-API...
            </div>

            <div id="wordsearch-container" class="hidden w-full max-w-5xl mx-auto flex flex-col items-center"></div>
            
            <div id="svg-game-container" class="hidden w-full grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
                <div class="lg:col-span-8 bg-white p-6 rounded-3xl shadow-sm border border-slate-200/60 min-h-[500px] flex flex-col">
                   <div class="flex justify-between items-center mb-6">
                       <div>
                           <span class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Theme / Reference</span>
                           <h2 id="game-theme" class="text-lg font-bold text-slate-900"></h2>
                       </div>
                       <span id="game-level-badge" class="px-3 py-1 bg-slate-100 text-slate-500 rounded-full text-xs font-semibold uppercase"></span>
                   </div>
                   <div id="game-context" class="mb-4 text-sm text-slate-600 italic font-medium"></div>
                   
                   <div id="board-container" class="flex-grow flex items-center justify-center select-none w-full overflow-auto py-8"></div>
                   <div id="validation-error" class="hidden mt-4 p-4 bg-red-50 text-red-600 text-sm font-medium rounded-xl text-center"></div>
                </div>
                
                <div class="lg:col-span-4 flex flex-col space-y-4 h-full">
                    <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200/60 flex-grow max-h-[500px] overflow-y-auto">
                        <h3 class="text-xs font-bold uppercase tracking-widest text-slate-400 mb-4">Clues & Target Words</h3>
                        <div id="clues-container" class="space-y-2"></div>
                    </div>
                    <div class="flex flex-col space-y-2">
                        <button onclick="verifyAnswers()" class="w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-2xl active:scale-95 transition-all">Check Answers</button>
                        <button onclick="showAnswers()" class="w-full py-3 bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold rounded-2xl active:scale-95 transition-all">Show Answers (Skip to Next)</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="screen-success" class="w-full max-w-md hidden fade-in text-center bg-white p-10 rounded-3xl shadow-md border border-slate-200/60">
            <div class="w-20 h-20 bg-emerald-50 text-emerald-500 rounded-full flex items-center justify-center mx-auto mb-6 text-4xl">✓</div>
            <h2 class="text-3xl font-bold text-slate-900 mb-3">Level <span id="success-level-num"></span> Cleared!</h2>
            
            <div id="success-scripture" class="bg-slate-50 p-6 rounded-2xl border border-slate-100 mb-8 mt-6">
                <span class="block text-[10px] uppercase font-bold tracking-widest text-slate-400 mb-2">Decoded Scripture</span>
                <p id="success-verse" class="text-slate-800 font-bold leading-relaxed"></p>
            </div>

            <div class="flex flex-col space-y-3 mt-8">
                <button onclick="nextLevel()" class="w-full py-4 bg-slate-900 text-white font-semibold rounded-xl hover:bg-slate-800 active:scale-95 transition-all">Next Challenge</button>
                <button onclick="switchScreen('home')" class="w-full py-4 bg-white text-slate-600 border border-slate-200 font-semibold rounded-xl hover:bg-slate-50 active:scale-95 transition-all">Return to Hub</button>
            </div>
        </section>

    </main>

    <script>
        // API References Pool
        const API_VERSE_REFS = [
            "John 3:16", "Genesis 1:1", "Psalm 23:1", "Romans 8:28", "Philippians 4:13", 
            "Proverbs 3:5", "Isaiah 40:31", "Matthew 28:19", "Jeremiah 29:11", "Ephesians 2:8", 
            "Hebrews 11:1", "James 1:5", "Psalm 119:105", "Galatians 5:22"
        ];

        // Static fallback for Spiral
        const SPIRAL_DB = {
            easy: [{ level: 1, theme: "The Path of Creation", verse: "LIGHTADAMEVEGARDEN", clues: [{ id: 1, text: "Created on Day 1", answer: "LIGHT", startIdx: 0 }, { id: 2, text: "The first man", answer: "ADAM", startIdx: 5 }, { id: 3, text: "The first woman", answer: "EVE", startIdx: 9 }, { id: 4, text: "Paradise home", answer: "GARDEN", startIdx: 12 }] }]
        };

        const CATALOG = [
            { id: 'brick', title: 'Masonry Quotes', sub: 'Staggered Brick Grids', desc: 'Rebuild dynamic API scriptures stone by stone.', icon: '🧱' },
            { id: 'radial', title: 'Concentric Rings', sub: 'Radial Trivia', desc: 'Solve API Bible words in expanding circles.', icon: '🎯' },
            { id: 'spiral', title: 'Scripture Spiral', sub: 'Colorful Pathways', desc: 'Wind your way through vibrant, color-coded timelines.', icon: '🌀' },
            { id: 'wordsearch', title: 'Circular Search', sub: 'Procedural Generation', desc: 'Find 20-100 words in a massive circular polar grid.', icon: '🔍' },
            { id: 'flower', title: 'Word Flower', sub: 'Blooming Scriptures', desc: 'Find words organically blooming in a 6-petal grid.', icon: '🌸' }
        ];

        let State = {
            screen: 'home', shape: '', difficulty: 'easy', level: 1, puzzle: null, inputs: {}, 
            selectedCell: null, selectedClue: null, usedShowAnswers: false,
            ws: { grid: [], words: [], found: [], startCell: null, size: 5, apiRef: '', apiVerse: '' }
        };

        const screens = ['home', 'setup', 'playing', 'success'].map(s => document.getElementById(`screen-${s}`));
        const hiddenInput = document.getElementById('hidden-input');

        // Init UI
        document.getElementById('game-catalog').innerHTML = CATALOG.map(g => `
            <div onclick="selectGame('${g.id}')" class="group bg-white rounded-3xl p-8 border border-slate-200/60 shadow-sm hover:shadow-xl hover:border-indigo-200 transition-all duration-300 cursor-pointer flex flex-col active:scale-95">
                <div class="w-14 h-14 rounded-2xl bg-slate-50 border border-slate-100 flex items-center justify-center text-2xl mb-6 group-hover:scale-110 transition-transform">${g.icon}</div>
                <h3 class="text-xl font-bold text-slate-900 mb-1 group-hover:text-indigo-600 transition-colors">${g.title}</h3>
                <h4 class="text-[10px] font-semibold text-slate-400 uppercase tracking-widest mb-4">${g.sub}</h4>
                <p class="text-slate-500 text-sm font-medium leading-relaxed">${g.desc}</p>
            </div>
        `).join('');

        function switchScreen(target) {
            screens.forEach(s => s.classList.add('hidden'));
            document.getElementById(`screen-${target}`).classList.remove('hidden');
            document.getElementById('btn-dashboard').style.display = target === 'home' ? 'none' : 'block';
            State.screen = target;
        }

        function selectGame(id) {
            State.shape = id;
            document.getElementById('setup-icon').innerText = CATALOG.find(g => g.id === id).icon;
            switchScreen('setup');
        }

        function setDifficulty(diff) {
            State.difficulty = diff;
            document.getElementById('btn-diff-easy').className = diff === 'easy' ? 'p-5 rounded-2xl border-2 text-left border-indigo-600 bg-indigo-50' : 'p-5 rounded-2xl border-2 text-left border-slate-100 hover:border-slate-300';
            document.getElementById('btn-diff-hard').className = diff === 'hard' ? 'p-5 rounded-2xl border-2 text-left border-slate-900 bg-slate-50' : 'p-5 rounded-2xl border-2 text-left border-slate-100 hover:border-slate-300';
        }

        function startGame() { State.level = 1; document.getElementById('btn-level-num').innerText = State.level; loadLevel(); }
        function nextLevel() { State.level++; document.getElementById('btn-level-num').innerText = State.level; loadLevel(); }

        async function loadLevel() {
            switchScreen('playing');
            State.usedShowAnswers = false;
            document.getElementById('validation-error').classList.add('hidden');
            document.getElementById('wordsearch-container').classList.add('hidden');
            document.getElementById('svg-game-container').classList.add('hidden');
            document.getElementById('api-loading').classList.remove('hidden');
            
            if (State.shape === 'wordsearch' || State.shape === 'flower') {
                await generateGridGame(State.shape);
                document.getElementById('api-loading').classList.add('hidden');
                document.getElementById('wordsearch-container').classList.remove('hidden');
            } else if (State.shape === 'spiral') {
                State.puzzle = SPIRAL_DB.easy[0];
                setupSVGGame();
            } else {
                await generateDynamicPuzzle(State.shape);
                setupSVGGame();
            }
        }

        // ======================================================================
        // DYNAMIC API DATA GENERATION (Brick & Radial)
        // ======================================================================
        async function generateDynamicPuzzle(shape) {
            const ref = API_VERSE_REFS[Math.floor(Math.random() * API_VERSE_REFS.length)];
            let verse = "GOD CREATED THE HEAVENS AND THE EARTH"; 
            
            try {
                const res = await fetch(`https://bible-api.com/${ref}`);
                const data = await res.json();
                verse = data.text.trim().replace(/[^a-zA-Z\s]/g, '').toUpperCase();
            } catch (e) { console.log("API fallback used."); }

            let words = verse.split(/\s+/).filter(w => w.length > 2);
            if (words.length > 10) words = words.slice(0, 10);

            let clues = words.map((w, i) => ({ id: i+1, text: `Word from passage: ${w}`, answer: w }));

            let puzzle = { theme: ref, verse: verse, fullText: verse, clues: clues };

            if (shape === 'brick') {
                let grid = [];
                let row = 0, colOffset = 0;
                words.forEach((w, i) => {
                    if (colOffset + w.length > 12) { row++; colOffset = 0; }
                    grid.push({ wordIdx: i, row: row, startCol: colOffset, length: w.length });
                    colOffset += w.length + 1;
                });
                puzzle.grid = grid;
            } else if (shape === 'radial') {
                clues.forEach((c, i) => { c.ring = i % 3; });
                puzzle.sectors = 12;
            }

            State.puzzle = puzzle;
        }

        function setupSVGGame() {
            document.getElementById('api-loading').classList.add('hidden');
            document.getElementById('svg-game-container').classList.remove('hidden');
            
            document.getElementById('game-theme').innerText = State.puzzle.theme;
            document.getElementById('game-level-badge').innerText = `Level ${State.level}`;
            document.getElementById('game-context').innerText = State.puzzle.fullText ? `"${State.puzzle.fullText}"` : "";
            
            State.inputs = {};
            State.selectedCell = null;
            State.selectedClue = State.puzzle.clues[0]?.id;
            
            if (State.shape === 'brick') {
                State.puzzle.grid.forEach(w => { for (let i = 0; i < w.length; i++) State.inputs[`b-${w.row}-${w.startCol + i}`] = (State.difficulty === 'easy' && i === 0) ? State.puzzle.clues[w.wordIdx].answer[0] : ''; });
            } else if (State.shape === 'radial') {
                State.puzzle.clues.forEach(c => { for (let i = 0; i < c.answer.length; i++) State.inputs[`r-${c.ring}-${i}`] = (State.difficulty === 'easy' && i === 0) ? c.answer[0] : ''; });
            } else if (State.shape === 'spiral') {
                State.puzzle.clues.forEach(c => { for (let i = 0; i < c.answer.length; i++) State.inputs[`s-${c.startIdx + i}`] = (State.difficulty === 'easy' && i === 0) ? c.answer[0] : ''; });
            }
            
            renderSVGBoard();
            renderClues();
        }

        // ======================================================================
        // INPUT AND RENDERING FOR SVG GAMES
        // ======================================================================
        function handleCellClick(key) { State.selectedCell = key; renderSVGBoard(); hiddenInput.focus(); }

        hiddenInput.addEventListener('input', (e) => {
            if (!State.selectedCell) return;
            const char = e.target.value.slice(-1).toUpperCase();
            if (/^[A-Z]$/.test(char) || char === '') { State.inputs[State.selectedCell] = char; renderSVGBoard(); }
            e.target.value = ''; 
        });

        function renderClues() {
            document.getElementById('clues-container').innerHTML = State.puzzle.clues.map(c => {
                let clueText = c.text + ` <span class="text-indigo-500 font-bold">(${c.answer.length} letters)</span>`;
                return `
                <div onclick="State.selectedClue = ${c.id}; renderClues();" class="p-3 rounded-xl cursor-pointer border ${State.selectedClue === c.id ? 'bg-indigo-50 border-indigo-200 text-indigo-900' : 'bg-transparent border-transparent hover:bg-slate-50 text-slate-600'} transition-colors">
                    <p class="text-sm font-medium"><strong>${c.id}.</strong> ${clueText}</p>
                </div>
            `}).join('');
        }

        function renderSVGBoard() {
            const container = document.getElementById('board-container');
            let svgHTML = '';

            if (State.shape === 'brick') {
                const w = 600, h = 500, bw = 40, bh = 46;
                let rects = '';
                State.puzzle.grid.forEach(word => {
                    for (let i = 0; i < word.length; i++) {
                        const col = word.startCol + i, x = col * bw + (word.row % 2 * (bw / 2)) + 20, y = word.row * bh + 20;
                        const key = `b-${word.row}-${col}`, isSel = State.selectedCell === key, val = State.inputs[key] || '';
                        rects += `
                            <g onclick="handleCellClick('${key}')" class="cursor-pointer">
                                <rect x="${x}" y="${y}" width="${bw-4}" height="${bh-4}" rx="4" fill="${isSel ? '#e0e7ff' : '#ffffff'}" stroke="${isSel ? '#6366f1' : '#cbd5e1'}" stroke-width="${isSel ? 2 : 1}" />
                                <text x="${x + (bw/2) - 2}" y="${y + (bh/2) + 5}" text-anchor="middle" class="font-bold text-lg pointer-events-none" fill="#0f172a">${val}</text>
                            </g>
                        `;
                    }
                });
                svgHTML = `<svg width="100%" height="100%" viewBox="0 0 ${w} ${h}" style="max-height: 50vh;">${rects}</svg>`;
            } 
            else if (State.shape === 'radial') {
                const w = 500, h = 500, cx = w/2, cy = h/2;
                let paths = '';
                State.puzzle.clues.forEach(c => {
                    const innerR = 60 + c.ring * 45; const outerR = innerR + 40;
                    const angleStep = 360 / (c.answer.length + (c.answer.length%2===0?2:3));
                    
                    for(let i=0; i<c.answer.length; i++) {
                        const startA = i * angleStep - 90; const endA = startA + angleStep - 2;
                        const rS = (Math.PI * startA) / 180; const rE = (Math.PI * endA) / 180;
                        
                        const pData = `M ${cx + innerR * Math.cos(rS)} ${cy + innerR * Math.sin(rS)} 
                                       L ${cx + outerR * Math.cos(rS)} ${cy + outerR * Math.sin(rS)} 
                                       A ${outerR} ${outerR} 0 0 1 ${cx + outerR * Math.cos(rE)} ${cy + outerR * Math.sin(rE)} 
                                       L ${cx + innerR * Math.cos(rE)} ${cy + innerR * Math.sin(rE)} 
                                       A ${innerR} ${innerR} 0 0 0 ${cx + innerR * Math.cos(rS)} ${cy + innerR * Math.sin(rS)} Z`;
                        
                        const key = `r-${c.ring}-${i}`, isSel = State.selectedCell === key, val = State.inputs[key] || '';
                        
                        const tRad = (Math.PI * (startA + angleStep / 2)) / 180;
                        const tx = cx + ((innerR + outerR) / 2) * Math.cos(tRad);
                        const ty = cy + ((innerR + outerR) / 2) * Math.sin(tRad) + 6;

                        paths += `
                            <g onclick="handleCellClick('${key}')" class="cursor-pointer">
                                <path d="${pData}" fill="${isSel ? '#e0e7ff' : '#ffffff'}" stroke="${isSel ? '#6366f1' : '#cbd5e1'}" stroke-width="${isSel ? 2 : 1}" />
                                <text x="${tx}" y="${ty}" text-anchor="middle" class="font-bold text-lg pointer-events-none" fill="#0f172a">${val}</text>
                            </g>
                        `;
                    }
                });
                svgHTML = `<svg width="100%" height="100%" viewBox="0 0 ${w} ${h}" style="max-height: 50vh;">
                    <circle cx="${cx}" cy="${cy}" r="45" fill="#0f172a" />
                    <text x="${cx}" y="${cy+5}" text-anchor="middle" fill="#fff" class="text-xs font-bold tracking-widest">WORD</text>
                    ${paths}
                </svg>`;
            }
            else if (State.shape === 'spiral') {
                const w = 540, h = 440, bs = 40;
                let rects = '';
                for (let i = 0; i < State.puzzle.verse.length; i++) {
                    let x = i < 10 ? i : (i < 17 ? 9 : (i < 25 ? 9 - (i - 16) : 2));
                    let y = i < 10 ? 0 : (i < 17 ? i - 9 : (i < 25 ? 7 : 7 - (i - 24)));
                    const xP = x * (bs + 6) + 40, yP = y * (bs + 6) + 40;
                    const key = `s-${i}`, isSel = State.selectedCell === key, val = State.inputs[key] || '';
                    
                    const charCode = State.puzzle.verse.charCodeAt(i) || 65;
                    const hue = (charCode * 35) % 360; 
                    const bgColor = isSel ? '#e0e7ff' : `hsl(${hue}, 80%, 90%)`;
                    const borderColor = isSel ? '#6366f1' : `hsl(${hue}, 60%, 75%)`;

                    rects += `
                        <g onclick="handleCellClick('${key}')" class="cursor-pointer">
                            <rect x="${xP}" y="${yP}" width="${bs}" height="${bs}" rx="8" fill="${bgColor}" stroke="${borderColor}" stroke-width="${isSel ? 2.5 : 1.5}" />
                            <text x="${xP + bs/2}" y="${yP + bs/2 + 6}" text-anchor="middle" class="font-bold text-lg pointer-events-none" fill="#0f172a">${val}</text>
                            <text x="${xP + 4}" y="${yP + 12}" class="text-[9px] fill-slate-500 pointer-events-none font-bold">${i+1}</text>
                        </g>
                    `;
                }
                svgHTML = `<svg width="100%" height="100%" viewBox="0 0 ${w} ${h}" style="max-height: 50vh;">${rects}</svg>`;
            }

            container.innerHTML = svgHTML;
        }

        // ======================================================================
        // GRID GAME ENGINE (Handles both Word Search & Word Flower)
        // ======================================================================
        async function generateGridGame(shape) {
            const ref = API_VERSE_REFS[Math.floor(Math.random() * API_VERSE_REFS.length)];
            let generatedWords = [];
            let fetchedText = "";

            try {
                const response = await fetch(`https://bible-api.com/${ref}`);
                const data = await response.json();
                fetchedText = data.text.trim();
                const cleanedStr = fetchedText.replace(/[^a-zA-Z\s]/g, '').toUpperCase();
                generatedWords = [...new Set(cleanedStr.split(/\s+/))];
            } catch (error) {
                fetchedText = "For God so loved the world, that he gave his only begotten Son, that whosoever believeth in him should not perish, but have everlasting life.";
                generatedWords = ["GOD", "LOVE", "WORLD", "SON", "LIFE", "BELIEVE", "PERISH", "ETERNAL", "GRACE", "HOPE", "FAITH", "CROSS", "BLOOD", "MERCY", "PEACE", "SPIRIT", "HOLY", "TRUTH", "LIGHT"];
            }

            State.ws.apiRef = ref;
            State.ws.apiVerse = fetchedText;

            const targetWords = Math.min(100, Math.max(20, 20 + Math.floor((State.level - 1) * 2.75)));
            
            // Adjust size to account for the flower curve losing boundary area vs a perfect circle
            let size = Math.min(40, Math.max(16, Math.floor(Math.sqrt(targetWords * 10)))); 
            if (shape === 'flower') size = Math.floor(size * 1.35);

            State.ws.size = size;
            const center = size / 2 - 0.5;
            
            let grid = Array(size).fill(null).map(() => Array(size).fill(null));
            
            // Map out the geometric boundaries dynamically based on the game type
            for (let r=0; r<size; r++) {
                for (let c=0; c<size; c++) {
                    const dx = c - center;
                    const dy = r - center;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    
                    if (shape === 'wordsearch') {
                        if (dist <= size/2) grid[r][c] = ''; // Circular bounds
                    } else if (shape === 'flower') {
                        // Trigonometric Rose Curve (6 Petals)
                        const angle = Math.atan2(dy, dx);
                        const maxDist = (size / 2 - 1) * (0.7 + 0.3 * Math.cos(6 * angle)); 
                        if (dist <= maxDist) grid[r][c] = '';
                    }
                }
            }

            let validWords = generatedWords.filter(w => w.length >= 3 && w.length <= size);
            while (validWords.length < targetWords) {
                validWords = validWords.concat(validWords).slice(0, targetWords);
            }
            validWords = validWords.sort(() => 0.5 - Math.random());
            let words = validWords.slice(0, targetWords);
            let placed = [];

            const dirs = [[0,1], [1,0], [1,1], [-1,1]]; 
            
            words.forEach(word => {
                for(let a=0; a<150; a++) {
                    let [dr, dc] = dirs[Math.floor(Math.random() * dirs.length)];
                    let r = Math.floor(Math.random() * size), c = Math.floor(Math.random() * size);
                    let er = r + (word.length-1)*dr, ec = c + (word.length-1)*dc;
                    
                    if (er >= 0 && er < size && ec >= 0 && ec < size) {
                        let canPlace = true;
                        for (let i = 0; i < word.length; i++) {
                            const cr = r + i*dr; const cc = c + i*dc;
                            if (grid[cr][cc] === null || (grid[cr][cc] !== '' && grid[cr][cc] !== word[i])) { 
                                canPlace = false; break; 
                            }
                        }
                        if (canPlace) {
                            let coords = [];
                            for (let i = 0; i < word.length; i++) { 
                                grid[r + i*dr][c + i*dc] = word[i]; 
                                coords.push(`${r+i*dr},${c+i*dc}`); 
                            }
                            placed.push({ word, coords, found: false });
                            break;
                        }
                    }
                }
            });

            // Fill remaining blanks
            const alpha = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            for (let r=0; r<size; r++) {
                for (let c=0; c<size; c++) {
                    if (grid[r][c] === '') grid[r][c] = alpha[Math.floor(Math.random() * alpha.length)];
                }
            }
            
            State.ws.grid = grid;
            State.ws.words = placed;
            State.ws.found = [];
            State.ws.startCell = null;
            
            renderGridGame();
        }

        function wsClick(r, c) {
            if (!State.ws.startCell) {
                State.ws.startCell = {r, c};
            } else {
                const sr = State.ws.startCell.r, sc = State.ws.startCell.c;
                const dr = r - sr, dc = c - sc;
                const steps = Math.max(Math.abs(dr), Math.abs(dc));
                
                if (steps > 0 && (Math.abs(dr) === Math.abs(dc) || dr === 0 || dc === 0)) {
                    let str = "";
                    let rs = dr===0?0:dr/steps, cs = dc===0?0:dc/steps;
                    for(let i=0; i<=steps; i++) {
                        const cellVal = State.ws.grid[sr + i*rs]?.[sc + i*cs];
                        if (cellVal) str += cellVal;
                    }
                    const rev = str.split('').reverse().join('');
                    
                    const match = State.ws.words.find(w => !w.found && (w.word === str || w.word === rev));
                    if (match) {
                        match.found = true;
                        State.ws.found.push(...match.coords);
                        if (State.ws.words.every(w => w.found)) setTimeout(triggerWin, 500);
                    }
                }
                State.ws.startCell = null;
            }
            renderGridGame();
        }

        function renderGridGame() {
            const cont = document.getElementById('wordsearch-container');
            const cellW = State.ws.size > 20 ? 'w-5 h-5 text-xs' : 'w-7 h-7 md:w-8 md:h-8 text-sm md:text-base';
            
            const isFlower = State.shape === 'flower';
            const titleText = isFlower ? 'Word Flower' : 'Circular Word Search';
            
            const baseCls = isFlower ? "bg-rose-50 text-rose-800 hover:ring-2 hover:ring-pink-400" : "bg-slate-50 text-slate-700 hover:ring-2 hover:ring-indigo-300";
            const foundCls = isFlower ? "bg-pink-300 text-pink-900 border-pink-400 shadow-sm" : "bg-emerald-100 text-emerald-800 border-emerald-300";
            const anchorCls = isFlower ? "bg-rose-500 text-white shadow-md" : "bg-indigo-500 text-white shadow-md";
            const wordFoundCls = isFlower ? "bg-rose-50 text-rose-300 line-through" : "bg-slate-100 text-slate-300 line-through";
            const wordNotFoundCls = isFlower ? "bg-pink-100 text-pink-800 border border-pink-200" : "bg-indigo-50 text-indigo-700 border border-indigo-100";
            const verseBg = isFlower ? "bg-pink-50 border border-pink-200 text-pink-900" : "bg-indigo-50 border border-indigo-100 text-indigo-900";

            let gridHTML = `<div class="circular-grid mb-6 mx-auto overflow-hidden ${isFlower ? 'shadow-pink-900/10' : ''}" style="grid-template-columns: repeat(${State.ws.size}, minmax(0, 1fr))">`;
            
            for (let r=0; r<State.ws.size; r++) {
                for (let c=0; c<State.ws.size; c++) {
                    const char = State.ws.grid[r][c];
                    if (char === null) {
                        gridHTML += `<div class="${cellW} bg-transparent"></div>`;
                        continue;
                    }

                    const isFound = State.ws.found.includes(`${r},${c}`);
                    const isAnchor = State.ws.startCell?.r === r && State.ws.startCell?.c === c;
                    
                    let cls = baseCls;
                    if (isFound) cls = foundCls;
                    else if (isAnchor) cls = anchorCls;

                    gridHTML += `<div onclick="wsClick(${r}, ${c})" class="${cellW} flex items-center justify-center font-bold rounded-full cursor-pointer transition-all active:scale-90 ${cls}">${char}</div>`;
                }
            }
            gridHTML += `</div>`;
            
            let wordsHTML = `<div class="w-full bg-white p-6 rounded-3xl shadow-sm border border-slate-200/60 max-h-[300px] overflow-y-auto"><h3 class="text-xs font-bold uppercase tracking-widest text-slate-400 mb-4 border-b border-slate-100 pb-2">Target Words (${State.ws.words.filter(w=>w.found).length}/${State.ws.words.length})</h3><div class="flex flex-wrap gap-1.5">`;
            State.ws.words.forEach(w => {
                wordsHTML += `<span class="px-2 py-1 rounded-full text-xs font-bold ${w.found ? wordFoundCls : wordNotFoundCls}">${w.word}</span>`;
            });
            wordsHTML += `</div></div>`;

            cont.innerHTML = `
                <div class="w-full flex justify-between items-end mb-4 px-4">
                    <div>
                        <h2 class="text-2xl font-black text-slate-900 tracking-tight">${titleText}</h2>
                        <p class="text-sm font-semibold text-slate-500 uppercase tracking-widest">Level ${State.level} | ${State.ws.words.length} Words</p>
                    </div>
                    <button onclick="showAnswers()" class="px-4 py-2 bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold rounded-lg transition-all text-sm active:scale-95">Show Answers (Skip)</button>
                </div>
                
                <div class="w-full mb-6 p-4 rounded-xl ${verseBg}">
                     <p class="text-sm italic font-medium leading-relaxed">"${State.ws.apiVerse}" - ${State.ws.apiRef}</p>
                </div>

                ${gridHTML}
                ${wordsHTML}
            `;
        }

        // ======================================================================
        // WIN / SKIP LOGIC
        // ======================================================================
        function showAnswers() {
            State.usedShowAnswers = true;
            if (State.shape === 'wordsearch' || State.shape === 'flower') {
                State.ws.words.forEach(w => { w.found = true; State.ws.found.push(...w.coords); });
                renderGridGame();
                setTimeout(triggerWin, 1500); 
            } else {
                if (State.shape === 'brick' || State.shape === 'radial') {
                    State.puzzle.clues.forEach(c => {
                        for (let i = 0; i < c.answer.length; i++) {
                            if(State.shape === 'brick') {
                                const wInfo = State.puzzle.grid.find(g => g.wordIdx === c.id - 1);
                                if(wInfo) State.inputs[`b-${wInfo.row}-${wInfo.startCol + i}`] = c.answer[i];
                            } else {
                                State.inputs[`r-${c.ring}-${i}`] = c.answer[i];
                            }
                        }
                    });
                } else if (State.shape === 'spiral') {
                    for (let i = 0; i < State.puzzle.verse.length; i++) State.inputs[`s-${i}`] = State.puzzle.verse[i];
                }
                renderSVGBoard();
                setTimeout(triggerWin, 1500);
            }
        }

        function verifyAnswers() {
            let isValid = true;
            if (State.shape === 'brick') {
                State.puzzle.grid.forEach(w => {
                    const ans = State.puzzle.clues[w.wordIdx].answer;
                    for (let i = 0; i < w.length; i++) {
                        if ((State.inputs[`b-${w.row}-${w.startCol + i}`] || '') !== ans[i]) isValid = false;
                    }
                });
            } else if (State.shape === 'radial') {
                 State.puzzle.clues.forEach(c => {
                    for (let i = 0; i < c.answer.length; i++) {
                        if ((State.inputs[`r-${c.ring}-${i}`] || '') !== c.answer[i]) isValid = false;
                    }
                });
            } else if (State.shape === 'spiral') {
                for (let i = 0; i < State.puzzle.verse.length; i++) {
                    if ((State.inputs[`s-${i}`] || '') !== State.puzzle.verse[i]) isValid = false;
                }
            }

            if (isValid) triggerWin();
            else {
                const err = document.getElementById('validation-error');
                err.innerText = "Some letters are incorrect or missing. Keep trying!";
                err.classList.remove('hidden');
            }
        }

        function triggerWin() {
            if (State.usedShowAnswers) {
                State.usedShowAnswers = false;
                loadLevel(); 
                return;
            }

            document.getElementById('success-level-num').innerText = State.level;
            if (State.shape === 'wordsearch' || State.shape === 'flower') {
                document.getElementById('success-scripture').classList.add('hidden');
            } else {
                document.getElementById('success-scripture').classList.remove('hidden');
                document.getElementById('success-verse').innerText = `"${State.puzzle.verse}"`;
            }
            switchScreen('success');
        }
    </script>
